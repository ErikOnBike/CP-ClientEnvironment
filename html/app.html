<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style id="loader-style">
    #loader-block {
      display: none;
      position: absolute;
      width: 50%;
      min-width: 20em;
      height: 8rem;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    #loader-block:first-child:last-child {
      display: block;
    }
    #loader-block label {
      display: block;
      font-size: 32px;
      margin-bottom: 1rem;
    }
    #loader-progress {
      position: relative;
      display: block;
      width: 100%;
      height: 20px;
      border-radius: 10px;
      border: 1px solid #333;
      background-color: rgba(0, 0, 0, .1);
      overflow: hidden;
    }
    #loader-progress-bar {
      position: absolute;
      height: 100%;
      width: 50%;
      border: none;
      border-radius: 10px;
      background-color: rgba(0, 0, 0, .4);
    }
    #loader-block:first-child:last-child #loader-progress-bar {
      animation-duration: 2s;
      animation-iteration-count: infinite;
      animation-name: loader-progress-bar;
    }
    @keyframes loader-progress-bar {
      from {
        left: -50%;
      }
      to {
        left: 100%;
      }
    }
  </style>
  <script type="module" src="./webapp_bundle.min.js"></script>
  <script>
    // Set environment version (monotonic increasing counter, expecting exact match on server)
    globalThis.sessionStorage.setItem("CLIENT_VERSION", "9");

    let searchParams = new URLSearchParams(document.location.search);
    let appNameFromUrl = null;

    // Get application identifier from session (and check for presence in URL)
    let appNameFromSession = globalThis.sessionStorage.getItem("APP");
    if(appNameFromSession && searchParams.get(appNameFromSession) === "") {
      appNameFromUrl = appNameFromSession;
    }

    // Get application identifier from URL (as first search parameter without a value)
    if(!appNameFromUrl) {
      searchParams.forEach(function(value, key) {
        if(appNameFromUrl === null && key && !value) {
          appNameFromUrl = key;
        }
      });
    }

    // Set current application identifier using URL and session info
    if(appNameFromUrl && appNameFromUrl !== appNameFromSession) {
      if(appNameFromSession) {
        // End previous session by removing the session id
        globalThis.sessionStorage.removeItem("CLIENT_ID");
      }
      globalThis.sessionStorage.setItem("APP", appNameFromUrl);
    } else if(!appNameFromUrl && !appNameFromSession) {
      // In case no identifier is specified, the URL must have the form:
      // http://localhost:<port>/<app>["/app.html"|"/index.html"|"/index.htm"]
      if([ 'localhost', '127.0.0.1' ].includes(document.location.hostname)) {
        let pathSegements = document.location.pathname.split("/").filter(function(each) { return !!each; });
        if(pathSegements.length === 1 && !pathSegements[0].endsWith(".html")) {
          appNameFromUrl = pathSegements[0];
        } else if(pathSegements.length === 2 && [ 'app.html', 'index.html', 'index.htm' ].includes(pathSegements[1])) {
          appNameFromUrl = pathSegements[0];
        }
        if(appNameFromUrl) {
          globalThis.sessionStorage.setItem("APP", appNameFromUrl);
        }
      }
    }

    // Set server location
    globalThis.sessionStorage.setItem("SERVER_URL", document.location.protocol.replace("http", "ws") + "//" + document.location.host + "/io");

    // Set OS/platform identifier
    let platform = window.navigator.platform || "";
    let appVersion = window.navigator.appVersion || "";
    globalThis.sessionStorage.setItem("OS",
      platform.indexOf("Mac") >= 0 ? "macos" :
      platform.indexOf("Win") >= 0 ? "windows" :
      platform.indexOf("Linux") >= 0 ? "linux" :
      appVersion.indexOf("Mac") >= 0 ? "macos" :
      appVersion.indexOf("Win") >= 0 ? "windows" :
      appVersion.indexOf("Linux") >= 0 ? "linux" :
      "unknown");

    // Load and start image if this page and its scripts are loaded
    window.addEventListener("load", function() {
      globalThis.Squeak.fetchImageAndRun("./client-environment.image");
    });
  </script>
</head>
<body><div id="loader-block"><label>Loading...</label><div id="loader-progress"><div id="loader-progress-bar"></div></div></div></body>
</html>
